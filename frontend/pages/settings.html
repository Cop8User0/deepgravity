<!--
  DEEPGRAVITY – Settings Page Fragment
  Loaded dynamically into #app-container by the SPA router.
  All styles are hardcoded (no reliance on external CSS).
-->
<div class="animate-fade-in" style="max-width: 680px; margin: 0 auto; padding: 1rem 0;">
    
    <!-- Page Header -->
    <div style="margin-bottom: 1.5rem;">
        <h2 style="font-weight: 700; color: #e2e8f0; font-size: 1.8rem;">Settings</h2>
        <p style="color: #64748b; font-size: 0.9rem; margin-top: 0.3rem;">Manage your account and preferences</p>
    </div>
<!-- ============================================================
   BACK BUTTON SNIPPET
   Copy THIS ONLY and paste it at the very top of each page,
   right after <body> opens.
   ============================================================ -->
   <header id="shared-navbar" style="height:60px;background:#12121a;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;position:sticky;top:0;z-index:100;"></header>
<a href="../index.html" style="position:fixed;top:15px;left:20px;z-index:100;padding:0.5rem 1rem;background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">← Back to Home</a>
    <!-- ============================================================ -->
    <!-- EDIT PROFILE CARD -->
    <!-- ============================================================ -->
    <div style="background: #12121a; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 24px rgba(0,0,0,0.4); margin-bottom: 1rem;">
        
        <!-- Gradient Border Top -->
        <div style="height: 3px; background: linear-gradient(135deg, #8b5cf6, #06b6d4); margin: -1.5rem -1.5rem 1.5rem -1.5rem; border-radius: 12px 12px 0 0;"></div>
        
        <h3 style="font-weight: 700; color: #e2e8f0; margin-bottom: 1.25rem;">Edit Profile</h3>
        
        <form id="settings-profile-form" onsubmit="return false;">
            
            <!-- Display Name -->
            <div style="margin-bottom: 1.25rem;">
                <label style="display: block; color: #94a3b8; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.4rem;">Display Name</label>
                <input type="text" id="settings-display-name" required
                    style="width: 100%; padding: 0.75rem 1rem; background: #0a0a0f; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.3s ease;"
                    onfocus="this.style.borderColor='#8b5cf6'" onblur="this.style.borderColor='rgba(255,255,255,0.06)'">
            </div>
            <style>
html, body {
    background: #0a0a0f !important;
    color: #e2e8f0 !important;
}

</style>
            <!-- Bio -->
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; color: #94a3b8; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.4rem;">About Me (Bio)</label>
                <textarea id="settings-bio" style="width: 100%; min-height: 80px; background: #0a0a0f; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 0.75rem; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; font-size: 0.95rem; resize: vertical; outline: none; transition: border-color 0.3s ease;"
                    onfocus="this.style.borderColor='#8b5cf6'" onblur="this.style.borderColor='rgba(255,255,255,0.06)'"></textarea>
            </div>
            
            <!-- Save Button -->
            <button type="submit" id="settings-save-profile-btn"
                style="padding: 0.75rem 1.5rem; background: linear-gradient(135deg, #8b5cf6, #06b6d4); color: white; border: none; border-radius: 24px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);"
                onmouseover="this.style.boxShadow='0 6px 20px rgba(139, 92, 246, 0.5)'"
                onmouseout="this.style.boxShadow='0 4px 15px rgba(139, 92, 246, 0.3)'">
                Save Profile
            </button>
            
        </form>
    </div>

    <!-- ============================================================ -->
    <!-- CHANGE PASSWORD CARD -->
    <!-- ============================================================ -->
    <div style="background: #12121a; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 24px rgba(0,0,0,0.4); margin-bottom: 1rem;">
        
        <!-- Gradient Border Top -->
        <div style="height: 3px; background: linear-gradient(135deg, #06b6d4, #10b981); margin: -1.5rem -1.5rem 1.5rem -1.5rem; border-radius: 12px 12px 0 0;"></div>
        
        <h3 style="font-weight: 700; color: #e2e8f0; margin-bottom: 1.25rem;">Change Password</h3>
        
        <form id="settings-password-form" onsubmit="return false;">
            
            <!-- Current Password -->
            <div style="margin-bottom: 1.25rem;">
                <label style="display: block; color: #94a3b8; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.4rem;">Current Password</label>
                <input type="password" id="settings-old-password" required autocomplete="current-password"
                    style="width: 100%; padding: 0.75rem 1rem; background: #0a0a0f; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.3s ease;"
                    onfocus="this.style.borderColor='#8b5cf6'" onblur="this.style.borderColor='rgba(255,255,255,0.06)'">
            </div>
            
            <!-- New Password -->
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; color: #94a3b8; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.4rem;">New Password</label>
                <input type="password" id="settings-new-password" required autocomplete="new-password"
                    style="width: 100%; padding: 0.75rem 1rem; background: #0a0a0f; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.3s ease;"
                    onfocus="this.style.borderColor='#8b5cf6'" onblur="this.style.borderColor='rgba(255,255,255,0.06)'">
            </div>
            
            <!-- Update Password Button -->
            <button type="submit" id="settings-update-password-btn"
                style="padding: 0.75rem 1.5rem; background: linear-gradient(135deg, #06b6d4, #10b981); color: white; border: none; border-radius: 24px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);"
                onmouseover="this.style.boxShadow='0 6px 20px rgba(6, 182, 212, 0.5)'"
                onmouseout="this.style.boxShadow='0 4px 15px rgba(6, 182, 212, 0.3)'">
                Update Password
            </button>
            
        </form>
    </div>

    <!-- ============================================================ -->
    <!-- THEME TOGGLE CARD -->
    <!-- ============================================================ -->
    <div style="background: #12121a; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 24px rgba(0,0,0,0.4); margin-bottom: 1rem;">
        
        <!-- Gradient Border Top -->
        <div style="height: 3px; background: linear-gradient(135deg, #f59e0b, #8b5cf6); margin: -1.5rem -1.5rem 1.5rem -1.5rem; border-radius: 12px 12px 0 0;"></div>
        
        <h3 style="font-weight: 700; color: #e2e8f0; margin-bottom: 1.25rem;">Appearance</h3>
        
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <span style="font-weight: 600; color: #e2e8f0;">Dark Mode</span>
                <span style="display: block; font-size: 0.85rem; color: #64748b; margin-top: 0.2rem;">Toggle dark/light theme</span>
            </div>
            
            <!-- Toggle Switch -->
            <label style="position: relative; display: inline-block; width: 52px; height: 28px;">
                <input type="checkbox" id="settings-theme-toggle" checked style="opacity: 0; width: 0; height: 0;">
                <span style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #8b5cf6, #06b6d4); border-radius: 28px; transition: 0.3s;"></span>
                <span style="position: absolute; content: ''; height: 22px; width: 22px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s;" id="theme-toggle-dot"></span>
            </label>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- DANGER ZONE CARD -->
    <!-- ============================================================ -->
    <div style="background: #12121a; border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 24px rgba(0,0,0,0.4);">
        
        <!-- Red Border Top -->
        <div style="height: 3px; background: #ef4444; margin: -1.5rem -1.5rem 1.5rem -1.5rem; border-radius: 12px 12px 0 0;"></div>
        
        <h3 style="font-weight: 700; color: #ef4444; margin-bottom: 1.25rem;">⚠ Danger Zone</h3>
        
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <span style="font-weight: 600; color: #ef4444;">Delete Account</span>
                <span style="display: block; font-size: 0.85rem; color: #64748b; margin-top: 0.2rem;">This action is irreversible. All your data will be permanently deleted!</span>
            </div>
            
            <button id="delete-account-btn"
                style="padding: 0.7rem 1.5rem; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; border-radius: 24px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.3s ease; white-space: nowrap;"
                onmouseover="this.style.background='#ef4444'; this.style.color='white'" 
                onmouseout="this.style.background='rgba(239, 68, 68, 0.1)'; this.style.color='#ef4444'">
                Delete
            </button>
        </div>
    </div>

</div>
