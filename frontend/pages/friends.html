<!-- ============================================================
   DEEPGRAVITY – pages/friends.html (COMPLETE)
   Friends Page – Friends List, Requests, Search, Add Friend
   ============================================================ -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends – DEEPGRAVITY</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/friends.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <style>
        html, body { background:#0a0a0f!important; color:#e2e8f0; margin:0; padding:0; }
        body { padding-top:60px; font-family:'Inter',system-ui,sans-serif; }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- SHARED NAVBAR                                                  -->
    <!-- ============================================================ -->
    <header id="shared-navbar" style="height:60px;background:#12121a;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;position:fixed;top:0;left:0;right:0;z-index:100;"></header>

    <!-- ============================================================ -->
    <!-- FRIENDS PAGE CONTENT                                           -->
    <!-- ============================================================ -->
    <div style="max-width:900px;margin:0 auto;padding:1rem;">
        
        <!-- Page Header -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h2 style="color:#e2e8f0;font-weight:700;">Friends</h2>
        </div>
        
        <!-- Tabs -->
        <div style="display:flex;gap:4px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:20px;">
            <button class="friends-tab-btn active" id="tab-friends" onclick="switchTab('friends')" 
                style="padding:10px 20px;background:transparent;border:none;color:#e2e8f0;font-weight:600;cursor:pointer;font-family:inherit;font-size:0.9rem;border-bottom:2px solid #8b5cf6;">
                My Friends
            </button>
            <button class="friends-tab-btn" id="tab-requests" onclick="switchTab('requests')"
                style="padding:10px 20px;background:transparent;border:none;color:#64748b;font-weight:600;cursor:pointer;font-family:inherit;font-size:0.9rem;border-bottom:2px solid transparent;">
                Requests <span id="requests-badge" style="background:#ef4444;color:white;padding:2px 8px;border-radius:12px;font-size:0.75rem;display:none;">0</span>
            </button>
            <button class="friends-tab-btn" id="tab-find" onclick="switchTab('find')"
                style="padding:10px 20px;background:transparent;border:none;color:#64748b;font-weight:600;cursor:pointer;font-family:inherit;font-size:0.9rem;border-bottom:2px solid transparent;">
                Find Friends
            </button>
        </div>
        
        <!-- Search Input (hidden by default) -->
        <div id="search-container" style="display:none;margin-bottom:20px;">
            <input type="text" id="friends-search-input" placeholder="Search by name..."
                style="width:100%;padding:0.75rem 1rem;background:#0a0a0f;border:1px solid rgba(255,255,255,0.06);border-radius:8px;color:#e2e8f0;font-family:inherit;font-size:0.95rem;outline:none;">
        </div>
        
        <!-- Friends Grid -->
        <div id="friends-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;">
            <!-- Dynamically populated -->
        </div>
        
    </div>

    <!-- ============================================================ -->
    <!-- JAVASCRIPT – Friends Logic                                    -->
    <!-- ============================================================ -->
    <script>
        // Load shared navbar
        document.getElementById('shared-navbar').innerHTML = `
            <a href="../index.html" style="font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#8b5cf6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;">DEEPGRAVITY</a>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
                <a href="feed.html" style="padding:0.5rem 1rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">Feed</a>
                <a href="chat.html" style="padding:0.5rem 1rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">Chat</a>
                <a href="messages.html" style="padding:0.5rem 1rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">Messages</a>
                <a href="profile.html" style="padding:0.5rem 1rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">Profile</a>
                <a href="settings.html" style="padding:0.5rem 1rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">Settings</a>
                <a href="../index.html" style="padding:0.5rem 1rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">🏠 Home</a>
            </div>
        `;

        // ============================================================
        // FRIENDS LOGIC
        // ============================================================
        var currentTab = 'friends';
        var friends = [];
        var requests = [];
        
        // Load from localStorage
        try {
            var storedFriends = localStorage.getItem('dg_friends');
            if (storedFriends) friends = JSON.parse(storedFriends);
            var storedRequests = localStorage.getItem('dg_friend_requests');
            if (storedRequests) requests = JSON.parse(storedRequests);
        } catch(e) {}
        
        // Default friends if empty
        if (friends.length === 0) {
            friends = [
                { id:1, name:'Shadow', avatar:'/uploads/profiles/user1.png', online:true },
                { id:2, name:'Cipher', avatar:'/uploads/profiles/user2.png', online:false },
                { id:3, name:'Relay', avatar:'/uploads/profiles/user3.png', online:true }
            ];
            saveFriends();
        }
        
        if (requests.length === 0) {
            requests = [
                { id:4, name:'Phantom', avatar:'/uploads/profiles/user4.png' },
                { id:5, name:'DarkNode', avatar:'/uploads/profiles/default.png' }
            ];
            saveRequests();
        }
        
        function saveFriends() {
            try { localStorage.setItem('dg_friends', JSON.stringify(friends)); } catch(e) {}
        }
        function saveRequests() {
            try { localStorage.setItem('dg_friend_requests', JSON.stringify(requests)); } catch(e) {}
        }
        
        // Switch tab
        window.switchTab = function(tab) {
            currentTab = tab;
            
            // Update tab styles
            document.querySelectorAll('.friends-tab-btn').forEach(function(btn) {
                btn.style.color = '#64748b';
                btn.style.borderBottomColor = 'transparent';
            });
            document.getElementById('tab-' + tab).style.color = '#e2e8f0';
            document.getElementById('tab-' + tab).style.borderBottomColor = '#8b5cf6';
            
            // Show/hide search
            document.getElementById('search-container').style.display = tab === 'find' ? 'block' : 'none';
            
            // Render
            renderGrid();
        };
        
        // Render grid
        function renderGrid() {
            var container = document.getElementById('friends-grid');
            var data = currentTab === 'friends' ? friends : currentTab === 'requests' ? requests : [];
            
            if (data.length === 0) {
                container.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#64748b;padding:3rem;"><div style="font-size:3rem;margin-bottom:1rem;">' + (currentTab === 'friends' ? '👥' : '📩') + '</div><p>' + (currentTab === 'friends' ? 'No friends yet.' : 'No pending requests.') + '</p></div>';
                return;
            }
            
            container.innerHTML = data.map(function(user) {
                if (currentTab === 'friends') {
                    return `
                        <div style="background:#12121a;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px;">
                            <div style="position:relative;">
                                <img src="${user.avatar}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;">
                                ${user.online ? '<span style="position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:#10b981;border-radius:50%;border:2px solid #12121a;"></span>' : ''}
                            </div>
                            <div style="flex:1;">
                                <div style="font-weight:600;color:#e2e8f0;">${user.name}</div>
                                <div style="font-size:0.8rem;color:${user.online ? '#10b981' : '#64748b'};">${user.online ? 'Online' : 'Offline'}</div>
                            </div>
                            <button onclick="removeFriend(${user.id})" style="background:none;border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.8rem;">Remove</button>
                        </div>
                    `;
                } else {
                    return `
                        <div style="background:#12121a;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px;">
                            <img src="${user.avatar}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;">
                            <div style="flex:1;">
                                <div style="font-weight:600;color:#e2e8f0;">${user.name}</div>
                                <div style="font-size:0.8rem;color:#64748b;">Wants to be friends</div>
                            </div>
                            <div style="display:flex;gap:6px;">
                                <button onclick="acceptRequest(${user.id})" style="background:#8b5cf6;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.8rem;">Accept</button>
                                <button onclick="rejectRequest(${user.id})" style="background:none;border:1px solid rgba(255,255,255,0.1);color:#64748b;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.8rem;">Reject</button>
                            </div>
                        </div>
                    `;
                }
            }).join('');
            
            // Update badge
            var badge = document.getElementById('requests-badge');
            if (badge) {
                badge.textContent = requests.length;
                badge.style.display = requests.length > 0 ? 'inline' : 'none';
            }
        }
        
        // Accept request
        window.acceptRequest = function(userId) {
            var user = requests.find(function(r) { return r.id === userId; });
            if (!user) return;
            friends.push({ id:user.id, name:user.name, avatar:user.avatar, online:false });
            requests = requests.filter(function(r) { return r.id !== userId; });
            saveFriends();
            saveRequests();
            renderGrid();
        };
        
        // Reject request
        window.rejectRequest = function(userId) {
            requests = requests.filter(function(r) { return r.id !== userId; });
            saveRequests();
            renderGrid();
        };
        
        // Remove friend
        window.removeFriend = function(userId) {
            if (!confirm('Remove this friend?')) return;
            friends = friends.filter(function(f) { return f.id !== userId; });
            saveFriends();
            renderGrid();
        };
        
        // Search
        document.getElementById('friends-search-input').addEventListener('input', function() {
            var query = this.value.trim().toLowerCase();
            var container = document.getElementById('friends-grid');
            
            if (!query) {
                container.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#64748b;padding:3rem;"><div style="font-size:3rem;margin-bottom:1rem;">🔍</div><p>Start typing to search for users...</p></div>';
                return;
            }
            
            // Simulate search results
            container.innerHTML = `
                <div style="background:#12121a;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px;">
                    <img src="/uploads/profiles/default.png" style="width:48px;height:48px;border-radius:50%;object-fit:cover;">
                    <div style="flex:1;">
                        <div style="font-weight:600;color:#e2e8f0;">${query.charAt(0).toUpperCase() + query.slice(1)}</div>
                        <div style="font-size:0.8rem;color:#64748b;">@${query.toLowerCase().replace(/\s/g,'_')}</div>
                    </div>
                    <button onclick="addFriend('${query}')" style="background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:white;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.8rem;">Add Friend</button>
                </div>
            `;
        });
        
        window.addFriend = function(name) {
            alert('Friend request sent to ' + name + '!');
        };
        
        // Initial render
        renderGrid();
        document.getElementById('requests-badge').textContent = requests.length;
        document.getElementById('requests-badge').style.display = requests.length > 0 ? 'inline' : 'none';
    </script>

</body>
</html>
