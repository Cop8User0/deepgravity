<!-- ============================================================
   DEEPGRAVITY – pages/messages.html (COMPLETE)
   Private Messages – Admin pre‑loaded, add new contacts
   ============================================================ -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages – DEEPGRAVITY</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/messages.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <style>
        html, body { background:#0a0a0f!important; color:#e2e8f0; margin:0; padding:0; }
        body { padding-top:60px; font-family:'Inter',system-ui,sans-serif; }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- SHARED NAVBAR                                                  -->
    <!-- ============================================================ -->
    <header id="shared-navbar" style="height:60px;background:#12121a;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;position:fixed;top:0;left:0;right:0;z-index:100;"></header>

    <!-- ============================================================ -->
    <!-- MESSAGES LAYOUT                                                -->
    <!-- ============================================================ -->
    <div class="messages-layout" style="display:grid;grid-template-columns:300px 1fr;height:calc(100vh-60px);">
        
        <!-- ============================================================ -->
        <!-- LEFT: CONTACTS LIST + ADD CONTACT                             -->
        <!-- ============================================================ -->
        <div style="background:#12121a;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;overflow:hidden;">
            
            <!-- Header -->
            <div style="padding:16px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center;">
                <h3 style="color:#e2e8f0;font-weight:700;margin:0;font-size:1rem;">Conversations</h3>
                <button id="add-contact-btn" style="width:30px;height:30px;background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:white;border:none;border-radius:50%;font-size:1.2rem;cursor:pointer;" title="Add Contact">+</button>
            </div>
            
            <!-- Contacts List -->
            <div id="conversations-list" style="flex:1;overflow-y:auto;padding:8px;">
                <!-- Dynamically populated -->
            </div>
            
        </div>
        
        <!-- ============================================================ -->
        <!-- RIGHT: MESSAGE THREAD                                         -->
        <!-- ============================================================ -->
        <div style="display:flex;flex-direction:column;background:#0a0a0f;">
            
            <!-- Chat Header -->
            <div style="padding:16px 24px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(15,15,24,0.4);display:flex;align-items:center;gap:12px;">
                <img id="chat-recipient-avatar" src="/uploads/profiles/default.png" alt="Avatar" style="width:40px;height:40px;border-radius:50%;object-fit:cover;display:none;">
                <div>
                    <h3 id="chat-recipient-name" style="color:#e2e8f0;font-weight:700;margin:0;">Select a Conversation</h3>
                    <span id="chat-recipient-status" style="font-size:0.8rem;color:#64748b;"></span>
                </div>
            </div>
            
            <!-- Messages -->
            <div id="private-messages-container" style="flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:12px;">
                <div style="margin:auto;text-align:center;color:#64748b;">
                    <div style="font-size:4rem;margin-bottom:1rem;">💬</div>
                    <p>Select a conversation from the left.</p>
                </div>
            </div>
            
            <!-- Message Input -->
            <div style="padding:16px 24px;border-top:1px solid rgba(255,255,255,0.06);background:rgba(18,18,26,0.8);">
                <div style="display:flex;gap:12px;">
                    <input type="text" id="private-message-input" placeholder="Type a message..." disabled
                        style="flex:1;padding:0.75rem 1rem;background:#0a0a0f;border:1px solid rgba(255,255,255,0.06);border-radius:8px;color:#e2e8f0;font-family:inherit;font-size:0.95rem;outline:none;">
                    <button id="private-send-btn" disabled
                        style="padding:0.75rem 1.5rem;background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:white;border:none;border-radius:24px;font-weight:600;font-size:0.95rem;cursor:pointer;opacity:0.5;">Send</button>
                </div>
            </div>
            
        </div>
        
    </div>

    <!-- ============================================================ -->
    <!-- JAVASCRIPT – Messages Logic                                   -->
    <!-- ============================================================ -->
    <script>
        // Load shared navbar
        document.getElementById('shared-navbar').innerHTML = `
            <a href="../index.html" style="font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#8b5cf6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;">DEEPGRAVITY</a>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
                <a href="feed.html" style="padding:0.5rem 1rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">Feed</a>
                <a href="chat.html" style="padding:0.5rem 1rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">Chat</a>
                <a href="friends.html" style="padding:0.5rem 1rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">Friends</a>
                <a href="profile.html" style="padding:0.5rem 1rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">Profile</a>
                <a href="settings.html" style="padding:0.5rem 1rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">Settings</a>
                <a href="../index.html" style="padding:0.5rem 1rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">🏠 Home</a>
            </div>
        `;

        // ============================================================
        // MESSAGES LOGIC
        // ============================================================
        var username = 'gravity888';  // You are always gravity888
        
        // Default contacts – pre‑loaded with admin conversations
        var contacts = [];
        
        // Load from localStorage
        try {
            var stored = localStorage.getItem('dg_contacts');
            if (stored) {
                contacts = JSON.parse(stored);
            } else {
                // Default contacts
                contacts = [
                    {
                        id: 'contact_1',
                        name: 'System Admin',
                        avatar: '/uploads/profiles/admin.png',
                        online: true,
                        messages: [
                            { from: 'System Admin', content: 'Welcome to DEEPGRAVITY Messages! Use this space for private conversations.', time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) }
                        ]
                    },
                    {
                        id: 'contact_2',
                        name: 'Security Node',
                        avatar: '/uploads/profiles/user1.png',
                        online: true,
                        messages: [
                            { from: 'Security Node', content: 'All systems operational. Encryption active.', time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) }
                        ]
                    }
                ];
                localStorage.setItem('dg_contacts', JSON.stringify(contacts));
            }
        } catch(e) {
            contacts = [];
        }
        
        var activeContact = null;
        var container = document.getElementById('private-messages-container');
        var input = document.getElementById('private-message-input');
        var sendBtn = document.getElementById('private-send-btn');
        var contactsList = document.getElementById('conversations-list');
        var recipientName = document.getElementById('chat-recipient-name');
        var recipientStatus = document.getElementById('chat-recipient-status');
        var recipientAvatar = document.getElementById('chat-recipient-avatar');

        // Save contacts
        function saveContacts() {
            try { localStorage.setItem('dg_contacts', JSON.stringify(contacts)); } catch(e) {}
        }

        // Render contacts list
        function renderContacts() {
            contactsList.innerHTML = contacts.map(function(contact) {
                var isActive = activeContact && activeContact.id === contact.id;
                return `
                    <div onclick="selectContact('${contact.id}')" 
                         style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;cursor:pointer;margin-bottom:4px;
                                background:${isActive ? 'rgba(139,92,246,0.12)' : 'transparent'};
                                border:1px solid ${isActive ? 'rgba(139,92,246,0.25)' : 'transparent'};">
                        <div style="position:relative;">
                            <img src="${contact.avatar}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;">
                            ${contact.online ? '<span style="position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:#10b981;border-radius:50%;border:2px solid #12121a;"></span>' : ''}
                        </div>
                        <div style="flex:1;min-width:0;">
                            <div style="font-weight:600;color:#e2e8f0;">${contact.name}</div>
                            <div style="font-size:0.75rem;color:#64748b;">${contact.messages.length} message${contact.messages.length !== 1 ? 's' : ''}</div>
                        </div>
                        <button onclick="event.stopPropagation();deleteContact('${contact.id}')" 
                            style="background:none;border:none;color:#64748b;cursor:pointer;font-size:1.2rem;padding:4px;" title="Delete contact">&times;</button>
                    </div>
                `;
            }).join('');
        }

        // Select contact
        window.selectContact = function(contactId) {
            activeContact = contacts.find(function(c) { return c.id === contactId; });
            if (!activeContact) return;
            
            recipientName.textContent = activeContact.name;
            recipientStatus.textContent = activeContact.online ? 'Online' : 'Offline';
            recipientStatus.style.color = activeContact.online ? '#10b981' : '#64748b';
            recipientAvatar.src = activeContact.avatar;
            recipientAvatar.style.display = 'block';
            
            input.disabled = false;
            input.placeholder = 'Type a message...';
            sendBtn.disabled = false;
            sendBtn.style.opacity = '1';
            
            renderContacts();
            renderMessages();
            setTimeout(function() { input.focus(); }, 200);
        };

        // Render messages
        function renderMessages() {
            if (!activeContact) {
                container.innerHTML = '<div style="margin:auto;text-align:center;color:#64748b;"><div style="font-size:4rem;margin-bottom:1rem;">💬</div><p>Select a conversation from the left.</p></div>';
                return;
            }
            
            var messages = activeContact.messages || [];
            
            if (messages.length === 0) {
                container.innerHTML = '<div style="margin:auto;text-align:center;color:#64748b;"><div style="font-size:4rem;margin-bottom:1rem;">💬</div><p>No messages yet. Start the conversation!</p></div>';
                return;
            }
            
            container.innerHTML = messages.map(function(msg) {
                var isSent = msg.from === username || msg.from === 'me';
                var senderName = isSent ? username : (msg.from || activeContact.name);
                var initial = senderName.charAt(0).toUpperCase();
                
                return `
                    <div style="display:flex;gap:10px;max-width:70%;align-self:${isSent ? 'flex-end' : 'flex-start'};flex-direction:${isSent ? 'row-reverse' : 'row'};animation:fadeIn 0.3s ease;">
                        <div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;flex-shrink:0;color:white;background:${isSent ? 'linear-gradient(135deg,#8b5cf6,#06b6d4)' : '#1a1a2e'};">
                            ${initial}
                        </div>
                        <div style="flex:1;min-width:0;">
                            <div style="font-size:0.75rem;color:#64748b;margin-bottom:4px;">${senderName}</div>
                            <div style="background:${isSent ? 'linear-gradient(135deg,#8b5cf6,#06b6d4)' : '#1a1a2e'};padding:12px 16px;border-radius:${isSent ? '12px 0 12px 12px' : '0 12px 12px 12px'};color:${isSent ? 'white' : '#e2e8f0'};font-size:0.9rem;line-height:1.4;">
                                ${msg.content}
                            </div>
                            <div style="font-size:0.65rem;color:rgba(255,255,255,0.4);margin-top:4px;text-align:right;">${msg.time}</div>
                            ${isSent ? '<div style="font-size:0.6rem;color:#10b981;margin-top:2px;">🔒 E2E Encrypted</div>' : ''}
                        </div>
                    </div>
                `;
            }).join('');
            
            setTimeout(function() { container.scrollTop = container.scrollHeight; }, 100);
        }

        // Send message
        function sendMessage() {
            if (!activeContact) return;
            var content = input.value.trim();
            if (!content) return;
            
            var now = new Date();
            activeContact.messages.push({
                from: username,
                content: content,
                time: now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
            });
            
            saveContacts();
            renderMessages();
            renderContacts();
            input.value = '';
            input.focus();
        }

        // Add contact
        function addContact() {
            var name = prompt('Enter contact name:');
            if (!name || !name.trim()) return;
            
            name = name.trim();
            
            var exists = contacts.some(function(c) { return c.name.toLowerCase() === name.toLowerCase(); });
            if (exists) {
                alert('A contact with that name already exists!');
                return;
            }
            
            var newContact = {
                id: 'contact_' + Date.now(),
                name: name,
                avatar: '/uploads/profiles/default.png',
                online: false,
                messages: [
                    { from: 'System', content: 'Conversation started with ' + name + '.', time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) }
                ]
            };
            
            contacts.push(newContact);
            saveContacts();
            renderContacts();
            selectContact(newContact.id);
        }

        // Delete contact
        window.deleteContact = function(contactId) {
            var contact = contacts.find(function(c) { return c.id === contactId; });
            if (!contact) return;
            if (!confirm('Delete conversation with "' + contact.name + '"?')) return;
            
            contacts = contacts.filter(function(c) { return c.id !== contactId; });
            
            if (activeContact && activeContact.id === contactId) {
                activeContact = null;
                recipientName.textContent = 'Select a Conversation';
                recipientStatus.textContent = '';
                recipientAvatar.style.display = 'none';
                input.disabled = true;
                sendBtn.disabled = true;
                sendBtn.style.opacity = '0.5';
                container.innerHTML = '<div style="margin:auto;text-align:center;color:#64748b;"><div style="font-size:4rem;margin-bottom:1rem;">💬</div><p>Select a conversation from the left.</p></div>';
            }
            
            saveContacts();
            renderContacts();
        };

        // Events
        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMessage(); });
        document.getElementById('add-contact-btn').addEventListener('click', addContact);

        // Init
        renderContacts();
    </script>

</body>
</html>
