<!-- INLINE SCRIPT – Search functionality -->
<!-- ============================================================ -->
<script>
(function() {
    const searchInput = document.getElementById('global-search-input');
    const resultsGrid = document.getElementById('search-results-grid');
    
    // Debounce function
    let debounceTimer;
    
    window.handleSearchInput = function() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(performSearch, 300);
    };
    
    function performSearch() {
        const query = searchInput.value.trim();
        
        // If empty, show initial state
        if (!query) {
            resultsGrid.innerHTML = `
                <div style="grid-column: 1 / -1; text-align: center; color: #64748b; padding: 3rem;">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">🔍</div>
                    <p style="font-weight: 600; color: #94a3b8; margin-bottom: 0.5rem;">Search for Users</p>
                    <p style="font-size: 0.9rem;">Start typing in the search field above to see results.</p>
                </div>`;
            return;
        }
        
        // Show loading
        resultsGrid.innerHTML = `
            <div style="grid-column: 1 / -1; text-align: center; color: #64748b; padding: 2rem;">
                <p>Searching for "${query}"...</p>
            </div>`;
        
        // Simulate API call (replace with real API call)
        setTimeout(() => {
            // This is a placeholder – real implementation would call the API
            resultsGrid.innerHTML = `
                <div style="grid-column: 1 / -1; text-align: center; color: #64748b; padding: 2rem;">
                    <p>No users found matching "${query}".</p>
                    <p style="font-size: 0.85rem; margin-top: 0.5rem;">Try a different search term.</p>
                </div>`;
        }, 500);
    }
    
    // Auto-focus search input
    if (searchInput) {
        setTimeout(() => searchInput.focus(), 100);
    }
})();
</script>
