<!-- ============================================================
   DEEPGRAVITY – pages/chat.html (COMPLETE)
   Chat with Rooms List + Create Room + Pre‑loaded Local Chat
   ============================================================ -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat – DEEPGRAVITY</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/chat.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <style>
        html, body { background:#0a0a0f!important; color:#e2e8f0; margin:0; padding:0; }
        body { padding-top:60px; font-family:'Inter',system-ui,sans-serif; }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- SHARED NAVBAR                                                  -->
    <!-- ============================================================ -->
    <header id="shared-navbar" style="height:60px;background:#12121a;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;position:fixed;top:0;left:0;right:0;z-index:100;"></header>

    <!-- ============================================================ -->
    <!-- CHAT LAYOUT – Sidebar + Chat Area                             -->
    <!-- ============================================================ -->
    <div style="display:grid;grid-template-columns:280px 1fr;height:calc(100vh-60px);">
        
        <!-- ============================================================ -->
        <!-- LEFT: ROOMS LIST + CREATE ROOM                                -->
        <!-- ============================================================ -->
        <div style="background:#12121a;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;overflow:hidden;">
            
            <!-- Header -->
            <div style="padding:16px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center;">
                <h3 style="color:#e2e8f0;font-weight:700;margin:0;font-size:1rem;">Chat Rooms</h3>
                <button id="create-room-btn" style="width:30px;height:30px;background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:white;border:none;border-radius:50%;font-size:1.2rem;cursor:pointer;">+</button>
            </div>
            
            <!-- Room List -->
            <div id="rooms-list" style="flex:1;overflow-y:auto;padding:8px;">
                <!-- Dynamically populated -->
            </div>
            
        </div>
        
        <!-- ============================================================ -->
        <!-- RIGHT: CHAT AREA                                              -->
        <!-- ============================================================ -->
        <div style="display:flex;flex-direction:column;background:#0a0a0f;">
            
            <!-- Active Room Header -->
            <div style="padding:16px 24px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(15,15,24,0.4);">
                <h3 id="active-room-title" style="color:#e2e8f0;font-weight:700;margin:0;">Select a Room</h3>
                <span id="active-room-info" style="font-size:0.8rem;color:#64748b;"></span>
            </div>
            
            <!-- Messages -->
            <div id="chat-messages-container" style="flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;">
                <div style="margin:auto;text-align:center;color:#64748b;">
                    <div style="font-size:4rem;margin-bottom:1rem;">💬</div>
                    <p>Select a room from the left to start chatting.</p>
                </div>
            </div>
            
            <!-- Message Input -->
            <div style="padding:16px 24px;border-top:1px solid rgba(255,255,255,0.06);background:rgba(18,18,26,0.8);">
                <div style="display:flex;gap:12px;">
                    <input type="text" id="chat-message-input" placeholder="Type a message..." disabled
                        style="flex:1;padding:0.75rem 1rem;background:#0a0a0f;border:1px solid rgba(255,255,255,0.06);border-radius:8px;color:#e2e8f0;font-family:inherit;font-size:0.95rem;outline:none;">
                    <button id="chat-send-btn" disabled
                        style="padding:0.75rem 1.5rem;background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:white;border:none;border-radius:24px;font-weight:600;font-size:0.95rem;cursor:pointer;opacity:0.5;">Send</button>
                </div>
            </div>
            
        </div>
        
    </div>

    <!-- ============================================================ -->
    <!-- JAVASCRIPT – Full Chat Logic                                  -->
    <!-- ============================================================ -->
    <script>
        // Load shared navbar
        document.getElementById('shared-navbar').innerHTML = `
            <a href="../index.html" style="font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#8b5cf6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;">DEEPGRAVITY</a>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
                <a href="feed.html" style="padding:0.5rem 1rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">Feed</a>
                <a href="messages.html" style="padding:0.5rem 1rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">Messages</a>
                <a href="friends.html" style="padding:0.5rem 1rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">Friends</a>
                <a href="profile.html" style="padding:0.5rem 1rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">Profile</a>
                <a href="settings.html" style="padding:0.5rem 1rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">Settings</a>
                <a href="../index.html" style="padding:0.5rem 1rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#8b5cf6;text-decoration:none;font-weight:600;font-size:0.9rem;">🏠 Home</a>
            </div>
        `;

        // ============================================================
        // CHAT LOGIC
        // ============================================================
        var username = 'gravity888';
        
        // Default rooms – Local Chat is pre‑loaded
        var rooms = [
            {
                id: 'local',
                name: 'Local Chat',
                messages: [
                    { sender: 'System', content: 'Welcome to Local Chat! Messages are stored in your browser.', time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) }
                ]
            }
        ];
        
        // Load rooms from localStorage
        try {
            var storedRooms = localStorage.getItem('dg_chat_rooms');
            if (storedRooms) {
                var parsed = JSON.parse(storedRooms);
                // Merge – keep local chat if not present
                var hasLocal = parsed.some(function(r) { return r.id === 'local'; });
                if (!hasLocal) {
                    parsed.unshift(rooms[0]);
                }
                rooms = parsed;
            } else {
                localStorage.setItem('dg_chat_rooms', JSON.stringify(rooms));
            }
        } catch(e) {}
        
        var activeRoom = null;
        var container = document.getElementById('chat-messages-container');
        var input = document.getElementById('chat-message-input');
        var sendBtn = document.getElementById('chat-send-btn');
        var roomsList = document.getElementById('rooms-list');
        var roomTitle = document.getElementById('active-room-title');
        var roomInfo = document.getElementById('active-room-info');

        // Save rooms
        function saveRooms() {
            try {
                localStorage.setItem('dg_chat_rooms', JSON.stringify(rooms));
            } catch(e) {}
        }

        // Render room list
        function renderRoomList() {
            roomsList.innerHTML = rooms.map(function(room) {
                var isActive = activeRoom && activeRoom.id === room.id;
                return `
                    <div onclick="selectRoom('${room.id}')" 
                         style="padding:12px;border-radius:10px;cursor:pointer;margin-bottom:4px;
                                background:${isActive ? 'rgba(139,92,246,0.15)' : 'transparent'};
                                border:1px solid ${isActive ? 'rgba(139,92,246,0.3)' : 'transparent'};">
                        <div style="font-weight:600;color:#e2e8f0;"># ${room.name}</div>
                        <div style="font-size:0.75rem;color:#64748b;">${room.messages ? room.messages.length : 0} messages</div>
                    </div>
                `;
            }).join('');
        }

        // Select a room
        window.selectRoom = function(roomId) {
            activeRoom = rooms.find(function(r) { return r.id === roomId; });
            if (!activeRoom) return;
            
            roomTitle.textContent = '# ' + activeRoom.name;
            roomInfo.textContent = activeRoom.messages ? activeRoom.messages.length + ' messages' : '';
            
            input.disabled = false;
            input.placeholder = 'Type a message...';
            sendBtn.disabled = false;
            sendBtn.style.opacity = '1';
            
            renderRoomList();
            renderMessages();
            
            setTimeout(function() { input.focus(); }, 200);
        };

        // Render messages
        function renderMessages() {
            if (!activeRoom) {
                container.innerHTML = '<div style="margin:auto;text-align:center;color:#64748b;"><div style="font-size:4rem;margin-bottom:1rem;">💬</div><p>Select a room from the left to start chatting.</p></div>';
                return;
            }
            
            var messages = activeRoom.messages || [];
            
            if (messages.length === 0) {
                container.innerHTML = '<div style="margin:auto;text-align:center;color:#64748b;"><div style="font-size:4rem;margin-bottom:1rem;">💬</div><p>No messages yet. Start the conversation!</p></div>';
                return;
            }
            
            container.innerHTML = messages.map(function(msg) {
                if (msg.sender === 'System') {
                    return '<div style="text-align:center;color:#64748b;font-size:0.8rem;font-style:italic;padding:8px;">' + msg.content + '</div>';
                }
                
                var isSent = msg.sender === username;
                var initial = msg.sender.charAt(0).toUpperCase();
                
                return `
                    <div style="display:flex;gap:10px;max-width:70%;align-self:${isSent ? 'flex-end' : 'flex-start'};flex-direction:${isSent ? 'row-reverse' : 'row'};animation:fadeIn 0.3s ease;">
                        <div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;flex-shrink:0;color:white;background:${isSent ? 'linear-gradient(135deg,#8b5cf6,#06b6d4)' : '#1a1a2e'};">
                            ${initial}
                        </div>
                        <div style="flex:1;min-width:0;">
                            <div style="font-size:0.75rem;color:#64748b;margin-bottom:4px;">${msg.sender}</div>
                            <div style="background:${isSent ? 'linear-gradient(135deg,#8b5cf6,#06b6d4)' : '#1a1a2e'};padding:12px 16px;border-radius:${isSent ? '12px 0 12px 12px' : '0 12px 12px 12px'};color:${isSent ? 'white' : '#e2e8f0'};font-size:0.9rem;line-height:1.4;">
                                ${msg.content}
                            </div>
                            <div style="font-size:0.65rem;color:rgba(255,255,255,0.4);margin-top:4px;text-align:right;">${msg.time}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            setTimeout(function() { container.scrollTop = container.scrollHeight; }, 100);
        }

        // Send message
        function sendMessage() {
            if (!activeRoom) return;
            var content = input.value.trim();
            if (!content) return;
            
            var now = new Date();
            activeRoom.messages.push({
                sender: username,
                content: content,
                time: now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
            });
            
            saveRooms();
            renderMessages();
            renderRoomList();
            
            input.value = '';
            input.focus();
        }

        // Create room
        function createRoom() {
            var name = prompt('Enter room name:');
            if (!name || !name.trim()) return;
            
            name = name.trim();
            
            var exists = rooms.some(function(r) { return r.name.toLowerCase() === name.toLowerCase(); });
            if (exists) {
                alert('A room with that name already exists!');
                return;
            }
            
            var newRoom = {
                id: 'room_' + Date.now(),
                name: name,
                messages: [
                    { sender: 'System', content: 'Room created. Welcome!', time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) }
                ]
            };
            
            rooms.push(newRoom);
            saveRooms();
            renderRoomList();
            selectRoom(newRoom.id);
        }

        // Events
        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
        document.getElementById('create-room-btn').addEventListener('click', createRoom);

        // Init
        renderRoomList();
    </script>

</body>
</html>
